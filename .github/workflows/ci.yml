name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Syntax check
        run: npm run check

      - name: Unit tests
        run: npm test

      - name: Smoke test
        run: |
          npm start &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT
          for i in {1..30}; do
            curl -fsS http://localhost:3001/api/health && break
            sleep 1
          done
          npm run smoke
