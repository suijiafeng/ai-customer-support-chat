<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AssistFlow · 智能客服</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="customer-body">
    <main class="customer-app">
      <section class="customer-hero" aria-label="AssistFlow 服务说明">
        <div class="brand compact customer-brand">
          <div class="brand-mark">AF</div>
          <div>
            <strong>AssistFlow</strong>
            <span>企业智能客服中心</span>
          </div>
        </div>
        <h1 class="hero-heading">高效、专业的<br />智能客服体验</h1>
        <p class="hero-desc">AI 优先处理常见问题，复杂情况无缝转接人工客服，7×24 不间断为您服务。</p>
        <div class="hero-stats">
          <div class="hero-stat">
            <strong>&lt;&thinsp;3s</strong>
            <span>平均响应时间</span>
          </div>
          <div class="hero-stat">
            <strong>98%</strong>
            <span>客户满意度</span>
          </div>
          <div class="hero-stat">
            <strong>24/7</strong>
            <span>全天候在线</span>
          </div>
        </div>
        <div class="customer-metrics" aria-label="服务承诺">
          <span>AI 智能分析</span>
          <span>安全加密传输</span>
          <span>人工兜底保障</span>
        </div>
      </section>

      <section class="customer-chat">
        <header class="customer-chat-header">
          <div class="chat-title">
            <div class="chat-avatar" aria-hidden="true">AI</div>
            <div>
              <h2>AssistFlow 客服</h2>
              <p><span class="status-dot"></span><span id="statusText">在线服务中</span></p>
            </div>
          </div>
          <div class="customer-header-actions">
            <span id="visitorCode" class="visitor-code">访客码生成中</span>
            <a id="agentLink" href="/agent.html" target="_blank" rel="noopener">客服端</a>
          </div>
        </header>

        <div id="modeBanner" class="mode-banner">
          <span class="mode-dot"></span>
          <span id="modeText">AI 自动接管</span>
        </div>

        <section class="identity-panel" aria-label="客户信息">
          <div class="field-group">
            <label for="customerName">称呼</label>
            <input id="customerName" autocomplete="name" maxlength="24" placeholder="可选" />
          </div>
          <div class="field-group">
            <label for="customerContact">联系方式</label>
            <input id="customerContact" autocomplete="email tel" maxlength="40" placeholder="手机号或邮箱，可选" />
          </div>
          <p id="profileStatus" class="profile-status">未填写也可以直接咨询</p>
        </section>

        <div id="messages" class="messages customer-messages">
          <article class="message bot">
            <div class="bot-avatar">AI</div>
            <div class="message-body">
              <div class="bubble">你好！我是 AssistFlow 智能客服，很高兴为您服务。可以帮您查询订单、申请退款、开具发票等，请直接描述您的问题。</div>
              <div class="message-meta">刚刚</div>
            </div>
          </article>
        </div>

        <div class="quick-actions customer-actions" aria-label="常见问题">
          <button data-prompt="帮我查一下订单 A1001">查订单</button>
          <button data-prompt="我想申请退款">申请退款</button>
          <button data-prompt="怎么开发票？">开发票</button>
          <button data-prompt="我要转人工客服">转人工</button>
        </div>

        <form id="chatForm" class="composer customer-composer">
          <input id="messageInput" autocomplete="off" placeholder="请输入你的问题" />
          <button type="submit">发送</button>
        </form>
      </section>
    </main>

    <script src="/customer.js"></script>
  </body>
</html>
